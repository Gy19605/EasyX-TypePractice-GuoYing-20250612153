<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 软萌小兔打字乐园 | 郭颖 20250612153</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "微软雅黑", "圆体", system-ui;
}
body {
  background: linear-gradient(150deg, #fff5f9, #fff0f6, #fef0f8);
  min-height: 100vh;
  padding: 24px 16px;
}
.container {
  max-width: 960px;
  margin: 0 auto;
}
/* 顶部头部萌系样式 */
.header-box {
  background: #ffffff;
  border-radius: 28px;
  padding: 22px 16px;
  text-align: center;
  border: 3px solid #ffc8dd;
  box-shadow: 0 6px 16px rgba(255, 182, 193, 0.35);
  margin-bottom: 22px;
}
.header-box h1 {
  font-size: 32px;
  color: #ff75a0;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.student-info {
  font-size: 17px;
  color: #b76cf0;
  font-weight: 500;
}
.user-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  font-size: 18px;
  padding: 10px 16px;
  background: #ffeef7;
  border-radius: 20px;
  margin-bottom: 20px;
  color: #883962;
  flex-wrap: wrap;
}
#login-name {
  color: #ff5995;
  font-weight: bold;
}
.logout-btn {
  padding: 6px 16px;
  border-radius: 14px;
  border: none;
  background: #ff8888;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s;
}
.logout-btn:hover {
  background: #ff5555;
  transform: scale(1.05);
}
.level-tag {
  background: #ffe8a8;
  color: #b87b00;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 15px;
}
/* 功能按钮网格 */
.menu-wrap {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 24px;
}
.menu-btn {
  padding: 16px 8px;
  border: none;
  border-radius: 22px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.22s ease;
  color: #fff;
}
.menu-btn:nth-child(1) {background: linear-gradient(135deg,#ffb3d1,#ff8fb9);}
.menu-btn:nth-child(2) {background: linear-gradient(135deg,#b5e8d8,#7cdbc0);}
.menu-btn:nth-child(3) {background: linear-gradient(135deg,#ffe8a8,#ffd26f);}
.menu-btn:nth-child(4) {background: linear-gradient(135deg,#d8c8ff,#b298f5);}
.menu-btn:nth-child(5) {background: linear-gradient(135deg,#b8e4ff,#83c7f7);}
.menu-btn:nth-child(6) {background: linear-gradient(135deg,#ffd6c8,#ffab91);}
.menu-btn:nth-child(7) {background: linear-gradient(135deg,#c3f0ca,#66d287);}
.menu-btn:nth-child(8) {background: linear-gradient(135deg,#f0c3f0,#d68cd6);}
.menu-btn:nth-child(9) {background: linear-gradient(135deg,#ffd9cc,#ff9e7d);}
.menu-btn:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 7px 14px rgba(255,140,170,0.3);
}
/* 主内容面板 */
.main-panel {
  background: #ffffff;
  border-radius: 26px;
  border: 3px solid #ffdde6;
  padding: 32px 26px;
  min-height: 340px;
  box-shadow: 0 5px 18px rgba(255, 200, 220, 0.25);
}
.hide {display: none;}
/* 表单样式 */
.form-row {
  margin: 22px 0;
}
.form-row label {
  display: inline-block;
  width: 120px;
  font-size: 18px;
  color: #772b4a;
}
.form-input {
  padding: 12px 16px;
  width: 330px;
  border-radius: 16px;
  border: 2px solid #ffc8dd;
  background: #fff7fa;
  font-size: 17px;
  outline: none;
  transition: 0.2s;
}
.form-input:focus {
  border-color: #ff75a0;
  box-shadow: 0 0 0 3px rgba(255,117,160,0.2);
}
.sub-btn {
  padding: 11px 26px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
  margin: 0 7px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}
.btn-pink {background: #ff8fb9;color:#fff;}
.btn-green {background: #7cdbc0;color:#fff;}
.btn-blue {background: #83c7f7;color:#fff;}
.btn-orange {background: #ffab91;color:#fff;}
.sub-btn:hover {opacity: 0.85; transform: scale(1.04);}
.tip-text {
  margin-top: 14px;
  font-size: 17px;
  color: #e84a7c;
}
/* 打字文字样式 萌系配色 */
.target-box {
  font-size: 30px;
  letter-spacing: 4px;
  line-height: 2.2;
  margin: 24px 0;
  user-select: none;
}
.char-right {color: #36c9a0;}
.char-wrong {color: #ff4775; text-decoration: wavy underline;}
.char-wait {color: #c2b3bc;}
.char-cursor {
  color: #ffc107;
  animation: cuteBlink 0.65s infinite;
}
@keyframes cuteBlink {
  0%,100% {opacity: 1;}
  50% {opacity: 0.2;}
}
.type-input-box {
  width: 100%;
  padding: 15px 20px;
  border-radius: 20px;
  border: 2px solid #ffb3d1;
  background: #fff7fa;
  font-size: 22px;
  outline: none;
  margin-top: 10px;
}
/* 数据统计卡片行 */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.stat-card {
  background: #fff0f6;
  border-radius: 18px;
  text-align: center;
  padding: 14px 8px;
  border: 2px solid #ffdde6;
}
.stat-num {
  font-size: 27px;
  font-weight: bold;
  color: #ff5995;
  margin: 6px 0;
}
/* 按键统计网格 */
.key-grid-box {
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 9px;
  margin-top: 18px;
}
.key-item {
  background: #ffeef7;
  padding: 7px 3px;
  text-align: center;
  border-radius: 10px;
  font-size: 14px;
  color: #913c5e;
  border: 1px solid #ffd6e2;
}
/* 历史记录条目 */
.record-item {
  padding: 10px 0;
  border-bottom: 1px dashed #ffd6e2;
  font-size: 17px;
  color: #632b41;
}
/* 弹窗样式 */
.modal-wrap {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal-content {
  background: #fff;
  padding: 36px 32px;
  border-radius: 30px;
  border: 4px solid #ffb3d1;
  text-align: center;
  min-width: 420px;
}
.modal-content h2 {
  color: #ff75a0;
  margin-bottom: 18px;
}
.combo-tag {
  display: inline-block;
  background: #ffe8a8;
  color: #b87b00;
  padding: 4px 12px;
  border-radius: 12px;
  margin: 6px 0;
  font-weight: bold;
}
.rank-item {
  padding: 8px 0;
  border-bottom: 1px dashed #ffd6e2;
  font-size: 17px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header-box">
    <h1>🐰 软萌小兔打字乐园</h1>
    <div class="student-info">姓名：郭颖 &nbsp;&nbsp; 学号：20250612153</div>
  </div>

  <div class="user-bar">
    当前登录：<span id="login-name">未登录</span>
    <span class="level-tag" id="levelInfo"></span>
    <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="userLogout()">🚪 退出登录</button>
  </div>

  <div class="menu-wrap">
    <button class="menu-btn" onclick="showPage('register')">📝 用户注册</button>
    <button class="menu-btn" onclick="showPage('login')">🔐 用户登录</button>
    <button class="menu-btn" onclick="startTypingGame()">⌨️ 普通打字练习</button>
    <button class="menu-btn" onclick="showHistoryRecord()">📊 历史成绩记录</button>
    <button class="menu-btn" onclick="openSettingPanel()">⚙️ 练习个性化设置</button>
    <button class="menu-btn" onclick="showKeyFrequency()">🗝️ 个人按键习惯统计</button>
    <button class="menu-btn" onclick="startSpeedMode()">⏱️ 限时冲刺模式</button>
    <button class="menu-btn" onclick="showErrorBook()">📒 错题收藏本</button>
    <button class="menu-btn" onclick="showRankBoard()">🏆 全局得分排行榜</button>
  </div>

  <!-- 主内容区域 -->
  <div class="main-panel" id="mainView">
    <div style="text-align:center;font-size:23px;color:#b97191;padding:50px 0;">
      ✨ 点击上方萌系功能按钮开启你的打字小游戏吧~
    </div>
  </div>
</div>

<!-- 结束弹窗 -->
<div class="modal-wrap" id="gameModal">
  <div class="modal-content">
    <h2>🎉 本局打字挑战完成啦</h2>
    <div id="modalText"></div>
    <div style="margin-top:22px;">
      <button class="sub-btn btn-pink" onclick="restartGame()">再来一局</button>
      <button class="sub-btn btn-blue" onclick="closeModal()">返回菜单</button>
    </div>
  </div>
</div>

<script>
// ===================== 本地持久化存储（替代原C语言user.dat/score.dat/keystat.dat） =====================
let userList = JSON.parse(localStorage.getItem("bunnyUser")) || [];
let scoreList = JSON.parse(localStorage.getItem("bunnyScore")) || [];
let keyCountData = JSON.parse(localStorage.getItem("bunnyKeyStat")) || {};
let errorBook = JSON.parse(localStorage.getItem("bunnyErrorBook")) || {};
let userLevelExp = JSON.parse(localStorage.getItem("bunnyLevelExp")) || {};
let currentAccount = "";

// 打字按键音效
const typeAudio = new Audio();
typeAudio.src = "data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp69i5gVm3P//AQ==";

// 游戏全局配置变量
let typingRunning = false;
let targetString = "";
let inputString = "";
let cursorPos = 0;
let correctCount = 0;
let useSecond = 0;
let timerId = null;
let comboNum = 0;
let maxCombo = 0;
let charTypeMode = 0; // 0小写字母 1字母+数字 2字母+数字符号
let totalGameTime = 60;
let totalCharLen = 60;
let isSpeedMode = false;

// 初始化页面登录状态
refreshLoginStatus();

// ============ 登录状态刷新 + 退出登录函数（新增核心功能） ============
function refreshLoginStatus() {
  document.getElementById("login-name").innerText = currentAccount || "未登录";
  const logoutBtn = document.getElementById("logoutBtn");
  const levelInfo = document.getElementById("levelInfo");
  if(currentAccount) {
    logoutBtn.style.display = "inline-block";
    // 计算等级
    let exp = userLevelExp[currentAccount] || 0;
    let level = Math.floor(exp / 100) + 1;
    levelInfo.innerText = `等级Lv.${level} 经验${exp}`;
  } else {
    logoutBtn.style.display = "none";
    levelInfo.innerText = "";
  }
}

// 退出登录
function userLogout() {
  if(!confirm("确定要退出当前账号吗？")) return;
  currentAccount = "";
  typingRunning = false;
  clearInterval(timerId);
  refreshLoginStatus();
  resetHomeView();
  alert("已成功退出登录~");
}

// 切换页面容器
function showPage(type) {
  const viewBox = document.getElementById("mainView");
  viewBox.innerHTML = "";
  if(type === "register") buildRegisterUI();
  else if(type === "login") buildLoginUI();
}

// ============ 1、用户注册界面 ============
function buildRegisterUI() {
  const view = document.getElementById("mainView");
  view.innerHTML = `
    <h2 style="text-align:center;color:#ff75a0;margin-bottom:28px;">🍬 新用户注册</h2>
    <div class="form-row">
      <label>设置用户名：</label>
      <input class="form-input" id="regUsername" placeholder="输入可爱昵称">
    </div>
    <div class="form-row">
      <label>设置密码：</label>
      <input class="form-input" type="password" id="regPwd" placeholder="设置登录密码">
    </div>
    <div style="text-align:center;margin-top:32px;">
      <button class="sub-btn btn-pink" onclick="submitRegister()">确认注册</button>
      <button class="sub-btn btn-green" onclick="resetHomeView()">返回首页</button>
    </div>
    <div class="tip-text" id="regTipMsg"></div>
  `;
}
function submitRegister() {
  let name = document.getElementById("regUsername").value.trim();
  let pwd = document.getElementById("regPwd").value.trim();
  let tipDom = document.getElementById("regTipMsg");
  if(!name || !pwd) return tipDom.innerText = "用户名和密码不能为空哦~";
  let isExist = userList.some(item => item.username === name);
  if(isExist) return tipDom.innerText = "该昵称已经被别人注册啦，换一个吧";
  userList.push({username: name, password: pwd});
  localStorage.setItem("bunnyUser", JSON.stringify(userList));
  tipDom.innerText = "注册成功！快去登录玩耍吧🥳";
}

// ============ 2、用户登录界面 ============
function buildLoginUI() {
  const view = document.getElementById("mainView");
  view.innerHTML = `
    <h2 style="text-align:center;color:#ff75a0;margin-bottom:28px;">🔒 账号登录</h2>
    <div class="form-row">
      <label>用户名：</label>
      <input class="form-input" id="loginUserInput" placeholder="输入你的昵称">
    </div>
    <div class="form-row">
      <label>登录密码：</label>
      <input class="form-input" type="password" id="loginPwdInput" placeholder="输入密码">
    </div>
    <div style="text-align:center;margin-top:32px;">
      <button class="sub-btn btn-pink" onclick="submitLogin()">登录</button>
      <button class="sub-btn btn-green" onclick="resetHomeView()">返回首页</button>
    </div>
    <div class="tip-text" id="loginTipMsg"></div>
  `;
}
function submitLogin() {
  let name = document.getElementById("loginUserInput").value.trim();
  let pwd = document.getElementById("loginPwdInput").value.trim();
  let tipDom = document.getElementById("loginTipMsg");
  let findUser = userList.find(u => u.username === name && u.password === pwd);
  if(!findUser) return tipDom.innerText = "昵称或密码输错啦，再试试~";
  currentAccount = name;
  keyCountData[currentAccount] = keyCountData[currentAccount] || {};
  errorBook[currentAccount] = errorBook[currentAccount] || {};
  userLevelExp[currentAccount] = userLevelExp[currentAccount] || 0;
  refreshLoginStatus();
  tipDom.innerText = "登录成功！欢迎回来小兔子🐇";
}

// 返回初始首页
function resetHomeView() {
  document.getElementById("mainView").innerHTML = `
    <div style="text-align:center;font-size:23px;color:#b97191;padding:50px 0;">
      ✨ 点击上方萌系功能按钮开启你的打字小游戏吧~
    </div>
  `;
}

// 生成随机目标字符串（对应原EasyX getRandChar）
function createRandomText() {
  let charPool = "";
  let letter = "abcdefghijklmnopqrstuvwxyz";
  let number = "0123456789";
  let symbol = "!@#$%^&*()_+-=[]{}|;:,.<>?";
  if(charTypeMode === 0) charPool = letter;
  else if(charTypeMode === 1) charPool = letter + number;
  else charPool = letter + number + symbol;
  let resStr = "";
  for(let i=0; i<totalCharLen; i++){
    let randomIdx = Math.floor(Math.random() * charPool.length);
    resStr += charPool[randomIdx];
  }
  return resStr;
}

// ============ 3、普通打字练习模式 ============
function startTypingGame() {
  if(!currentAccount){
    document.getElementById("mainView").innerHTML = `
      <div class="tip-text" style="text-align:center;font-size:22px;padding:45px 0;">
        请先登录你的账号才可以开始练习哦🥺
      </div>
    `;
    return;
  }
  isSpeedMode = false;
  initGameData();
  renderGamePanel();
}

// ============ 4、限时冲刺模式（新增玩法） ============
function startSpeedMode() {
  if(!currentAccount){
    document.getElementById("mainView").innerHTML = `
      <div class="tip-text" style="text-align:center;font-size:22px;padding:45px 0;">请先登录账号~</div>
    `;
    return;
  }
  isSpeedMode = true;
  totalGameTime = 30;
  initGameData();
  renderGamePanel();
}

// 初始化游戏数据
function initGameData() {
  typingRunning = true;
  cursorPos = 0;
  correctCount = 0;
  useSecond = 0;
  comboNum = 0;
  maxCombo = 0;
  inputString = "";
  targetString = createRandomText();
  clearInterval(timerId);
}

// 渲染打字界面
function renderGamePanel() {
  const view = document.getElementById("mainView");
  view.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">打字速度<div class="stat-num" id="speedShow">0</div>字/分钟</div>
      <div class="stat-card">正确率<div class="stat-num" id="rateShow">0%</div></div>
      <div class="stat-card">输入进度<div class="stat-num" id="progressShow">0/${totalCharLen}</div></div>
      <div class="stat-card">用时<div class="stat-num" id="timeShow">0</div>秒</div>
    </div>
    <div class="target-box" id="textRenderBox"></div>
    <input class="type-input-box" id="typeInputDom" autocomplete="off" placeholder="在这里敲击对应字母吧~" autofocus>
    <div style="text-align:center;margin-top:20px;">
      <span class="combo-tag">当前连击：<span id="comboShow">0</span></span>
      <button class="sub-btn btn-blue" style="margin-left:15px;" onclick="finishGameEarly()">提前结束本局</button>
    </div>
  `;
  renderTypingText();
  document.getElementById("typeInputDom").oninput = handleTypeInput;
  // 计时器
  timerId = setInterval(()=>{
    useSecond++;
    document.getElementById("timeShow").innerText = useSecond;
    calcAllData();
    if(useSecond >= totalGameTime) gameOverHandle();
  }, 1000);
}

// 输入监听处理
function handleTypeInput(e) {
  inputString = e.target.value;
  cursorPos = inputString.length;
  // 播放打字音效
  typeAudio.currentTime = 0;
  typeAudio.play().catch(()=>{});

  // 统计按键次数
  let lastKey = inputString[cursorPos - 1];
  if(lastKey){
    keyCountData[currentAccount][lastKey] = (keyCountData[currentAccount][lastKey] || 0) + 1;
    localStorage.setItem("bunnyKeyStat", JSON.stringify(keyCountData));
  }

  // 统计正确数量 + 连击判断
  correctCount = 0;
  let currentRight = true;
  for(let i=0; i<cursorPos; i++){
    if(inputString[i] === targetString[i]){
      correctCount++;
    }else{
      currentRight = false;
      // 存入错题本
      let wrongChar = targetString[i];
      errorBook[currentAccount][wrongChar] = (errorBook[currentAccount][wrongChar] || 0) + 1;
      localStorage.setItem("bunnyErrorBook", JSON.stringify(errorBook));
    }
  }
  // 连击逻辑
  if(currentRight && cursorPos > 0){
    comboNum++;
    if(comboNum > maxCombo) maxCombo = comboNum;
  }else{
    comboNum = 0;
  }
  document.getElementById("comboShow").innerText = comboNum;
  renderTypingText();
  calcAllData();
  document.getElementById("progressShow").innerText = `${cursorPos}/${totalCharLen}`;
  // 全部输入完成自动结束
  if(cursorPos >= targetString.length) gameOverHandle();
}

// 渲染带颜色文字（对错萌系配色+闪烁光标）
function renderTypingText() {
  let htmlCode = "";
  for(let i=0; i<targetString.length; i++){
    let char = targetString[i];
    if(i < cursorPos){
      if(inputString[i] === char){
        htmlCode += `<span class="char-right">${char}</span>`;
      }else{
        htmlCode += `<span class="char-wrong">${char}</span>`;
      }
    }else if(i === cursorPos){
      htmlCode += `<span class="char-cursor">${char}</span>`;
    }else{
      htmlCode += `<span class="char-wait">${char}</span>`;
    }
  }
  document.getElementById("textRenderBox").innerHTML = htmlCode;
}

// 计算速度、正确率
function calcAllData() {
  let speed = useSecond > 0 ? Math.round(cursorPos / useSecond * 60) : 0;
  let rate = cursorPos > 0 ? (correctCount / cursorPos * 100).toFixed(1) : 0;
  document.getElementById("speedShow").innerText = speed;
  document.getElementById("rateShow").innerText = rate + "%";
  return {speed, rate: Number(rate)};
}

// 结束游戏、保存成绩、增加经验升级
function gameOverHandle() {
  clearInterval(timerId);
  typingRunning = false;
  let resData = calcAllData();
  let finalScore = Math.round(resData.speed * resData.rate / 2);

  // 增加经验值
  let addExp = Math.floor(finalScore / 2);
  userLevelExp[currentAccount] = (userLevelExp[currentAccount] || 0) + addExp;
  localStorage.setItem("bunnyLevelExp", JSON.stringify(userLevelExp));
  refreshLoginStatus();

  // 存入历史成绩
  scoreList.push({
    username: currentAccount,
    score: finalScore,
    totalInput: cursorPos,
    correctNum: correctCount,
    speed: resData.speed,
    accuracy: resData.rate,
    maxCombo: maxCombo,
    createTime: new Date().toLocaleString()
  });
  localStorage.setItem("bunnyScore", JSON.stringify(scoreList));

  // 弹窗填充内容
  let modalDom = document.getElementById("modalText");
  modalDom.innerHTML = `
    <p style="font-size:19px;line-height:2.1;">总输入字符：${cursorPos}</p>
    <p style="font-size:19px;line-height:2.1;">正确字符：${correctCount}</p>
    <p style="font-size:19px;line-height:2.1;">正确率：${resData.rate} %</p>
    <p style="font-size:19px;line-height:2.1;">打字速度：${resData.speed} 字/分钟</p>
    <p style="font-size:19px;line-height:2.1;">最高连击：${maxCombo}</p>
    <p style="font-size:21px;color:#ff75a0;font-weight:bold;">本局得分：${finalScore}</p>
    <p style="color:#b87b00;">获得经验 +${addExp}</p>
  `;
  document.getElementById("gameModal").style.display = "flex";
}
// 提前结束
function finishGameEarly(){
  gameOverHandle();
}
// 关闭弹窗
function closeModal(){
  document.getElementById("gameModal").style.display = "none";
  resetHomeView();
}
// 再来一局
function restartGame(){
  document.getElementById("gameModal").style.display = "none";
  if(isSpeedMode) startSpeedMode();
  else startTypingGame();
}

// ============ 4、查看个人历史成绩 ============
function showHistoryRecord() {
  if(!currentAccount){
    document.getElementById("mainView").innerHTML = `
      <div class="tip-text" style="text-align:center;font-size:22px;padding:45px 0;">请先登录账号查看成绩~</div>
    `;
    return;
  }
  const view = document.getElementById("mainView");
  let myRecords = scoreList.filter(item => item.username === currentAccount).reverse();
  let htmlStr = `<h2 style="text-align:center;color:#ff75a0;margin-bottom:24px;">📈 ${currentAccount} 的打字成绩单</h2>`;
  if(myRecords.length === 0){
    htmlStr += `<div class="tip-text">还没有练习记录，快去打一局吧🥕</div>`;
  }else{
    myRecords.forEach(item=>{
      htmlStr += `
        <div class="record-item">
          ${item.createTime} | 得分：${item.score} | 速度：${item.speed}字/分 | 正确率${item.accuracy}% | 最高连击${item.maxCombo}
        </div>
      `;
    })
  }
  htmlStr += `<div style="text-align:center;margin-top:28px;"><button class="sub-btn btn-pink" onclick="resetHomeView()">返回首页</button></div>`;
  view.innerHTML = htmlStr;
}

// ============ 5、个性化设置面板 ============
function openSettingPanel() {
  const view = document.getElementById("mainView");
  view.innerHTML = `
    <h2 style="text-align:center;color:#ff75a0;margin-bottom:26px;">⚙️ 练习个性化设置</h2>
    <div class="form-row">
      <label>字符难度模式：</label>
      <select class="form-input" id="modeSelect">
        <option value="0">简单：小写英文字母</option>
        <option value="1">中等：字母+数字</option>
        <option value="2">困难：字母+数字+符号</option>
      </select>
    </div>
    <div class="form-row">
      <label>单次练习时长：</label>
      <input class="form-input" type="number" id="timeSelect" min="20" max="180">
      <span style="margin-left:8px;">秒</span>
    </div>
    <div class="form-row">
      <label>单次总字符数量：</label>
      <input class="form-input" type="number" id="lenSelect" min="30" max="120">
      <span style="margin-left:8px;">个</span>
    </div>
    <div style="text-align:center;margin-top:30px;">
      <button class="sub-btn btn-pink" onclick="saveSettingConfig()">保存设置</button>
      <button class="sub-btn btn-green" onclick="resetHomeView()">返回</button>
    </div>
    <div class="tip-text" id="setTipMsg"></div>
  `;
  // 回填当前配置
  document.getElementById("modeSelect").value = charTypeMode;
  document.getElementById("timeSelect").value = totalGameTime;
  document.getElementById("lenSelect").value = totalCharLen;
}
function saveSettingConfig() {
  charTypeMode = Number(document.getElementById("modeSelect").value);
  totalGameTime = Number(document.getElementById("timeSelect").value);
  totalCharLen = Number(document.getElementById("lenSelect").value);
  document.getElementById("setTipMsg").innerText = "设置保存成功，下一局打字生效🍭";
}

// ============ 6、按键频次统计（个人按键习惯） ============
function showKeyFrequency() {
  if(!currentAccount){
    document.getElementById("mainView").innerHTML = `
      <div class="tip-text" style="text-align:center;font-size:22px;padding:45px 0;">请先登录查看你的按键习惯数据</div>
    `;
    return;
  }
  const view = document.getElementById("mainView");
  let userKeyData = keyCountData[currentAccount] || {};
  let htmlStr = `<h2 style="text-align:center;color:#ff75a0;margin-bottom:22px;">⌨️ ${currentAccount} 按键敲击频次统计</h2><div class="key-grid-box">`;
  for(let ch of "abcdefghijklmnopqrstuvwxyz"){
    let count = userKeyData[ch] || 0;
    htmlStr += `<div class="key-item">${ch}:${count}</div>`;
  }
  htmlStr += `</div><div style="text-align:center;margin-top:30px;"><button class="sub-btn btn-pink" onclick="resetHomeView()">返回首页</button></div>`;
  view.innerHTML = htmlStr;
}

// ============ 7、错题本功能（新增） ============
function showErrorBook() {
  if(!currentAccount){
    document.getElementById("mainView").innerHTML = `
      <div class="tip-text" style="text-align:center;font-size:22px;padding:45px 0;">请先登录查看错题</div>
    `;
    return;
  }
  const view = document.getElementById("mainView");
  let wrongData = errorBook[currentAccount] || {};
  let htmlStr = `<h2 style="text-align:center;color:#ff75a0;margin-bottom:22px;">📒 ${currentAccount} 易错字符错题本</h2>`;
  let hasError = false;
  for(let key in wrongData){
    if(wrongData[key]>0){
      hasError = true;
      htmlStr += `<div class="record-item">字符【${key}】 打错次数：${wrongData[key]}</div>`;
    }
  }
  if(!hasError) htmlStr += `<div class="tip-text">太棒啦，暂时没有易错字符~</div>`;
  htmlStr += `<div style="text-align:center;margin-top:30px;"><button class="sub-btn btn-pink" onclick="resetHomeView()">返回首页</button></div>`;
  view.innerHTML = htmlStr;
}

// ============ 8、全局得分排行榜（新增） ============
function showRankBoard() {
  const view = document.getElementById("mainView");
  // 取每用户最高分
  let userMaxScore = {};
  scoreList.forEach(rec=>{
    if(!userMaxScore[rec.username] || rec.score > userMaxScore[rec.username]){
      userMaxScore[rec.username] = rec.score;
    }
  })
  let rankArr = Object.entries(userMaxScore).sort((a,b)=>b[1]-a[1]);
  let htmlStr = `<h2 style="text-align:center;color:#ff75a0;margin-bottom:22px;">🏆 打字得分排行榜</h2>`;
  if(rankArr.length === 0){
    htmlStr += `<div class="tip-text">暂无任何人成绩，快去练习上榜吧</div>`;
  }else{
    rankArr.forEach((item,idx)=>{
      htmlStr += `<div class="rank-item">第${idx+1}名 | ${item[0]} | 历史最高分：${item[1]}</div>`;
    })
  }
  htmlStr += `<div style="text-align:center;margin-top:30px;"><button class="sub-btn btn-pink" onclick="resetHomeView()">返回首页</button></div>`;
  view.innerHTML = htmlStr;
}
</script>
